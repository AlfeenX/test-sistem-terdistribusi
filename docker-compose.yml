networks:
  sport-network:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - sport-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5437:5432"
    volumes:
      - pg_user_data:/var/lib/postgresql/data
    networks:
      - sport-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d users_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-field:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fields_db
    ports:
      - "5433:5432"
    volumes:
      - pg_field_data:/var/lib/postgresql/data
    networks:
      - sport-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fields_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-booking:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookings_db
    ports:
      - "5434:5432"
    volumes:
      - pg_booking_data:/var/lib/postgresql/data
    networks:
      - sport-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bookings_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments_db
    ports:
      - "5435:5432"
    volumes:
      - pg_payment_data:/var/lib/postgresql/data
    networks:
      - sport-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d payments_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications_db
    ports:
      - "5436:5432"
    volumes:
      - pg_notification_data:/var/lib/postgresql/data
    networks:
      - sport-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notifications_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
      args:
        DATABASE_URL_USER: postgresql://postgres:postgres@postgres-user:5432/users_db
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL_USER=postgresql://postgres:postgres@postgres-user:5432/users_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=gajayana_events
    networks:
      - sport-network
    depends_on:
      postgres-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  field-service-1:
    build:
      context: .
      dockerfile: ./apps/field-service-1/Dockerfile
      args:
        DATABASE_URL_FIELD: postgresql://postgres:postgres@postgres-field:5432/fields_db
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL_FIELD=postgresql://postgres:postgres@postgres-field:5432/fields_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=gajayana_events
    networks:
      - sport-network
    depends_on:
      postgres-field:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  field-service-2:
    build:
      context: .
      dockerfile: ./apps/field-service-2/Dockerfile
      args:
        DATABASE_URL_FIELD: postgresql://postgres:postgres@postgres-field:5432/fields_db
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL_FIELD=postgresql://postgres:postgres@postgres-field:5432/fields_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=gajayana_events
    networks:
      - sport-network
    depends_on:
      postgres-field:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: ./apps/booking-service/Dockerfile
      args:
        DATABASE_URL_BOOKING: postgresql://postgres:postgres@postgres-booking:5432/bookings_db
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL_BOOKING=postgresql://postgres:postgres@postgres-booking:5432/bookings_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=gajayana_events
      - FIELD_SERVICE_URL=http://field-service:3002
    networks:
      - sport-network
    depends_on:
      postgres-booking:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: ./apps/payment-service/Dockerfile
      args:
        DATABASE_URL_PAYMENT: postgresql://postgres:postgres@postgres-payment:5432/payments_db
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL_PAYMENT=postgresql://postgres:postgres@postgres-payment:5432/payments_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=gajayana_events
    networks:
      - sport-network
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: ./apps/notification-service/Dockerfile
      args:
        DATABASE_URL_NOTIFICATION: postgresql://postgres:postgres@postgres-notification:5432/notifications_db
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DATABASE_URL_NOTIFICATION=postgresql://postgres:postgres@postgres-notification:5432/notifications_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=gajayana_events
    networks:
      - sport-network
    depends_on:
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "3000:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NGINX_HOST=localhost
    networks:
      - sport-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_user_data:
  pg_field_data:
  pg_booking_data:
  pg_payment_data:
  pg_notification_data:
